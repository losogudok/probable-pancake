<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Научный клубок — Knowledge Graph</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; }
        .header { background: linear-gradient(135deg, #1e3a5f, #0f172a); padding: 20px 40px; border-bottom: 1px solid #334155; }
        .header h1 { font-size: 24px; color: #38bdf8; }
        .header p { font-size: 13px; color: #94a3b8; margin-top: 4px; }
        .container { display: flex; min-height: calc(100vh - 80px); }
        .sidebar { width: 250px; background: #1e293b; padding: 20px; border-right: 1px solid #334155; }
        .sidebar button { display: block; width: 100%; padding: 10px 15px; margin-bottom: 8px; background: transparent; border: 1px solid #334155; color: #e2e8f0; border-radius: 8px; cursor: pointer; text-align: left; font-size: 14px; transition: all 0.2s; }
        .sidebar button:hover, .sidebar button.active { background: #334155; border-color: #38bdf8; }
        .main { flex: 1; padding: 30px; overflow-y: auto; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box input { flex: 1; padding: 12px 16px; background: #1e293b; border: 1px solid #334155; color: #e2e8f0; border-radius: 8px; font-size: 15px; }
        .search-box input:focus { outline: none; border-color: #38bdf8; }
        .search-box button { padding: 12px 24px; background: #0ea5e9; border: none; color: white; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: 600; }
        .search-box button:hover { background: #0284c7; }
        .search-box button:disabled { background: #475569; cursor: not-allowed; }
        .examples { margin-bottom: 20px; }
        .examples button { padding: 6px 12px; margin: 4px 4px 4px 0; background: #1e293b; border: 1px solid #334155; color: #94a3b8; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .examples button:hover { color: #38bdf8; border-color: #38bdf8; }
        .answer { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 24px; margin-bottom: 20px; white-space: pre-wrap; line-height: 1.7; }
        .answer h2 { color: #38bdf8; margin-bottom: 12px; font-size: 18px; }
        .sources { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .sources h3 { color: #38bdf8; margin-bottom: 12px; font-size: 16px; }
        .source-item { padding: 10px; margin-bottom: 8px; background: #0f172a; border-radius: 8px; border-left: 3px solid #38bdf8; }
        .source-item .title { font-weight: 600; color: #e2e8f0; }
        .source-item .meta { font-size: 12px; color: #94a3b8; margin-top: 4px; }
        .source-item .trust { color: #fbbf24; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; text-align: center; }
        .stat-card .value { font-size: 32px; font-weight: 700; color: #38bdf8; }
        .stat-card .label { font-size: 13px; color: #94a3b8; margin-top: 4px; }
        .loading { text-align: center; padding: 40px; color: #94a3b8; }
        .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid #334155; border-top-color: #38bdf8; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .graph-container { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .graph-container h3 { color: #38bdf8; margin-bottom: 12px; }
        #graph-svg { width: 100%; height: 400px; background: #0f172a; border-radius: 8px; }
        .contradictions, .gaps { background: #1e293b; border: 1px solid #f87171; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .contradictions h3, .gaps h3 { color: #f87171; margin-bottom: 8px; }
        .tag { display: inline-block; padding: 2px 8px; margin: 2px; background: #334155; border-radius: 4px; font-size: 11px; color: #94a3b8; }
        .tag.process { background: #164e63; color: #67e8f9; }
        .tag.material { background: #3b1d0e; color: #fbbf24; }
        .tag.equipment { background: #1e3a2f; color: #6ee7b7; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Научный клубок — Knowledge Graph for Mining & Metallurgy R&D</h1>
        <p>Гибридный GraphRAG: семантический поиск + граф знаний + LLM для горно-металлургической отрасли</p>
    </div>
    <div class="container">
        <div class="sidebar">
            <button class="active" onclick="showTab('ask')">AI Ассистент</button>
            <button onclick="showTab('search')">Поиск</button>
            <button onclick="showTab('graph')">Граф знаний</button>
            <button onclick="showTab('dashboard')">Дашборд</button>
            <button onclick="showTab('contradictions')">Противоречия</button>
            <button onclick="showTab('gaps')">Пробелы</button>
            <button onclick="showTab('documents')">Документы</button>
        </div>
        <div class="main">
            <!-- AI Assistant Tab -->
            <div id="tab-ask" class="tab-content">
                <div class="search-box">
                    <input type="text" id="query-input" placeholder="Задайте вопрос на естественном языке..." onkeypress="if(event.key==='Enter')askQuery()">
                    <button onclick="askQuery()" id="ask-btn">Спросить</button>
                </div>
                <div class="examples">
                    <button onclick="setQuery('Какие методы обессоливания воды подходят для обогатительной фабрики, если исходная вода содержит сульфаты, хлориды, Ca, Mg, Na по 200-300 мг/л, а требуемый сухой остаток ≤1000 мг/дм³?')">Обессоливание воды</button>
                    <button onclick="setQuery('Какие технические решения организации циркуляции католита при электроэкстракции никеля описаны в мировой практике?')">Циркуляция католита</button>
                    <button onclick="setQuery('Покажите все эксперименты и публикации по распределению Au, Ag и МПГ между медным/никелевым штейном и шлаком за последние 5 лет')">Au-Ag-МПГ в штейне</button>
                    <button onclick="setQuery('Какие способы закачки шахтных вод в глубокие горизонты применялись в России и за рубежом?')">Закачка шахтных вод</button>
                    <button onclick="setQuery('Сравните отечественную и зарубежную практику кучного выщелачивания в холодном климате')">Сравнение практик</button>
                    <button onclick="setQuery('Какие публикации делают противоречивые выводы по оптимальной скорости циркуляции католита?')">Противоречия</button>
                </div>
                <div id="ask-results"></div>
            </div>

            <!-- Search Tab -->
            <div id="tab-search" class="tab-content hidden">
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Поиск по документам..." onkeypress="if(event.key==='Enter')doSearch()">
                    <button onclick="doSearch()">Найти</button>
                </div>
                <div id="search-results"></div>
            </div>

            <!-- Graph Tab -->
            <div id="tab-graph" class="tab-content hidden">
                <div class="search-box">
                    <input type="text" id="graph-input" placeholder="Найти сущность (например: электроэкстракция, никель)..." onkeypress="if(event.key==='Enter')showGraph()">
                    <button onclick="showGraph()">Показать граф</button>
                </div>
                <div id="graph-results"></div>
            </div>

            <!-- Dashboard Tab -->
            <div id="tab-dashboard" class="tab-content hidden">
                <div id="dashboard-results"></div>
            </div>

            <!-- Contradictions Tab -->
            <div id="tab-contradictions" class="tab-content hidden">
                <div id="contradictions-results"></div>
            </div>

            <!-- Gaps Tab -->
            <div id="tab-gaps" class="tab-content hidden">
                <div id="gaps-results"></div>
            </div>

            <!-- Documents Tab -->
            <div id="tab-documents" class="tab-content hidden">
                <div id="documents-results"></div>
            </div>
        </div>
    </div>

    <script>
        const API = '';
        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
            document.querySelectorAll('.sidebar button').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
            if (tab === 'dashboard') loadDashboard();
            if (tab === 'contradictions') loadContradictions();
            if (tab === 'gaps') loadGaps();
            if (tab === 'documents') loadDocuments();
        }
        function setQuery(q) { document.getElementById('query-input').value = q; }
        function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

        async function askQuery() {
            const q = document.getElementById('query-input').value.trim();
            if (!q) return;
            const btn = document.getElementById('ask-btn');
            btn.disabled = true;
            document.getElementById('ask-results').innerHTML = '<div class="loading"><div class="spinner"></div><p>Генерация ответа...</p></div>';
            try {
                const resp = await fetch(API + '/api/ask', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({query: q, top_k: 8})});
                const data = await resp.json();
                let html = '<div class="answer"><h2>Ответ</h2>' + esc(data.answer) + '</div>';
                if (data.sources && data.sources.length > 0) {
                    html += '<div class="sources"><h3>Источники (' + data.sources.length + ')</h3>';
                    data.sources.forEach(s => {
                        html += `<div class="source-item"><div class="title">[${s.index}] ${esc(s.title)}</div><div class="meta">${esc(s.filename)} | ${s.year||'н.д.'} | ${esc(s.geography)} | <span class="trust">${s.trust_stars}</span> | ${esc(s.category)}</div></div>`;
                    });
                    html += '</div>';
                }
                if (data.contradictions && data.contradictions.length > 0) {
                    html += '<div class="contradictions"><h3>Противоречия</h3>';
                    data.contradictions.forEach(c => { html += `<p>${esc(c.process)} → ${esc(c.parameter)}: диапазон ${c.range[0]}–${c.range[1]}</p>`; });
                    html += '</div>';
                }
                if (data.gaps && data.gaps.length > 0) {
                    html += '<div class="gaps"><h3>Пробелы в знаниях</h3>';
                    data.gaps.forEach(g => { html += `<p>${esc(g.process)} + ${esc(g.material)} — не изучено</p>`; });
                    html += '</div>';
                }
                document.getElementById('ask-results').innerHTML = html;
            } catch(e) {
                document.getElementById('ask-results').innerHTML = '<div class="answer">Ошибка: ' + esc(e.message) + '</div>';
            }
            btn.disabled = false;
        }

        async function doSearch() {
            const q = document.getElementById('search-input').value.trim();
            if (!q) return;
            document.getElementById('search-results').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            try {
                const resp = await fetch(API + '/api/search', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({query: q, top_k: 15})});
                const data = await resp.json();
                let html = `<p style="margin-bottom:15px;color:#94a3b8">Найдено: ${data.count}</p>`;
                data.results.forEach(r => {
                    html += `<div class="source-item"><div class="title">${esc(r.doc_title)}</div><div class="meta">${esc(r.doc_filename)} | ${r.doc_year||'н.д.'} | ${esc(r.doc_geography)} | score: ${r.score}</div><div style="margin-top:8px;font-size:13px;color:#cbd5e1">${esc(r.text)}</div></div>`;
                });
                document.getElementById('search-results').innerHTML = html || '<p>Ничего не найдено</p>';
            } catch(e) { document.getElementById('search-results').innerHTML = 'Ошибка: ' + esc(e.message); }
        }

        async function showGraph() {
            const q = document.getElementById('graph-input').value.trim();
            if (!q) return;
            document.getElementById('graph-results').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            try {
                const resp = await fetch(API + `/api/entities?name=${encodeURIComponent(q)}&limit=5`);
                const data = await resp.json();
                if (!data.entities || data.entities.length === 0) { document.getElementById('graph-results').innerHTML = '<p>Сущность не найдена</p>'; return; }
                const nodeId = data.entities[0].id;
                const graphResp = await fetch(API + `/api/graph/${encodeURIComponent(nodeId)}?depth=2&limit=30`);
                const graph = await graphResp.json();
                renderGraph(graph);
            } catch(e) { document.getElementById('graph-results').innerHTML = 'Ошибка: ' + esc(e.message); }
        }

        function renderGraph(graph) {
            if (!graph.nodes || graph.nodes.length === 0) { document.getElementById('graph-results').innerHTML = '<p>Граф пуст</p>'; return; }
            const colors = {Process:'#67e8f9', Material:'#fbbf24', Equipment:'#6ee7b7', Parameter:'#f87171', Publication:'#a78bfa', Expert:'#fb923c', Facility:'#e2e8f0'};
            let html = `<div class="graph-container"><h3>Граф знаний (${graph.nodes.length} узлов, ${graph.edges.length} связей)</h3>`;
            html += '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px">';
            Object.entries(colors).forEach(([t,c]) => { html += `<span class="tag" style="background:${c}22;color:${c}">${t}</span>`; });
            html += '</div>';
            // Simple SVG graph
            const w = 800, h = 400, cx = w/2, cy = h/2;
            const nodes = graph.nodes.map((n, i) => {
                const angle = (i / graph.nodes.length) * 2 * Math.PI;
                const r = i === 0 ? 0 : 150;
                return {...n, x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle)};
            });
            const nodeMap = {}; nodes.forEach(n => nodeMap[n.id] = n);
            html += `<svg id="graph-svg" viewBox="0 0 ${w} ${h}">`;
            // Edges
            graph.edges.forEach(e => {
                const s = nodeMap[e.source], t = nodeMap[e.target];
                if (s && t) html += `<line x1="${s.x}" y1="${s.y}" x2="${t.x}" y2="${t.y}" stroke="#475569" stroke-width="1" opacity="0.5"/>`;
            });
            // Nodes
            nodes.forEach(n => {
                const c = colors[n.type] || '#94a3b8';
                const r = n.id === graph.nodes[0].id ? 25 : 15;
                html += `<circle cx="${n.x}" cy="${n.y}" r="${r}" fill="${c}" opacity="0.8" stroke="${c}" stroke-width="2"/>`;
                html += `<text x="${n.x}" y="${n.y + r + 12}" text-anchor="middle" fill="#e2e8f0" font-size="10">${esc(n.canonical||n.name||'').substring(0,20)}</text>`;
            });
            html += '</svg></div>';
            // Node list
            html += '<div class="sources"><h3>Узлы</h3>';
            graph.nodes.forEach(n => {
                const c = colors[n.type] || '#94a3b8';
                html += `<div class="source-item"><span class="tag" style="background:${c}22;color:${c}">${esc(n.type)}</span> <strong>${esc(n.canonical||n.name)}</strong> <span class="meta">источников: ${(n.source_ids||[]).length}, trust: ${n.trust||1}</span></div>`;
            });
            html += '</div>';
            document.getElementById('graph-results').innerHTML = html;
        }

        async function loadDashboard() {
            try {
                const resp = await fetch(API + '/api/dashboard');
                const data = await resp.json();
                let html = '<div class="stats-grid">';
                html += `<div class="stat-card"><div class="value">${data.total_documents}</div><div class="label">Документов</div></div>`;
                html += `<div class="stat-card"><div class="value">${data.total_chunks}</div><div class="label">Фрагментов</div></div>`;
                html += `<div class="stat-card"><div class="value">${data.graph_stats.total_nodes}</div><div class="label">Узлов графа</div></div>`;
                html += `<div class="stat-card"><div class="value">${data.graph_stats.total_edges}</div><div class="label">Связей графа</div></div>`;
                html += `<div class="stat-card"><div class="value">${data.contradictions_count}</div><div class="label">Противоречий</div></div>`;
                html += `<div class="stat-card"><div class="value">${data.gaps_count}</div><div class="label">Пробелов</div></div>`;
                html += '</div>';
                // By type
                html += '<div class="sources"><h3>Узлы по типам</h3>';
                Object.entries(data.graph_stats.nodes_by_type||{}).forEach(([t,c]) => { html += `<span class="tag">${t}: ${c}</span> `; });
                html += '</div>';
                // By category
                html += '<div class="sources"><h3>Документы по категориям</h3>';
                Object.entries(data.documents_by_category||{}).forEach(([t,c]) => { html += `<span class="tag">${t}: ${c}</span> `; });
                html += '</div>';
                // By geography
                html += '<div class="sources"><h3>По географии</h3>';
                Object.entries(data.documents_by_geography||{}).forEach(([t,c]) => { html += `<span class="tag">${t}: ${c}</span> `; });
                html += '</div>';
                // By year
                html += '<div class="sources"><h3>По годам</h3>';
                Object.entries(data.documents_by_year||{}).forEach(([t,c]) => { html += `<span class="tag">${t}: ${c}</span> `; });
                html += '</div>';
                document.getElementById('dashboard-results').innerHTML = html;
            } catch(e) { document.getElementById('dashboard-results').innerHTML = 'Ошибка: ' + esc(e.message); }
        }

        async function loadContradictions() {
            try {
                const resp = await fetch(API + '/api/contradictions');
                const data = await resp.json();
                if (!data.contradictions || data.contradictions.length === 0) { document.getElementById('contradictions-results').innerHTML = '<p>Противоречия не обнаружены</p>'; return; }
                let html = '';
                data.contradictions.forEach(c => {
                    html += `<div class="contradictions"><h3>${esc(c.process)} → ${esc(c.parameter)}</h3><p>Диапазон значений: ${c.range[0]} – ${c.range[1]}</p>`;
                    c.entries.forEach(e => { html += `<div class="meta">Значение: ${e.value} ${esc(e.unit||'')}, trust: ${e.trust}, источников: ${(e.source_ids||[]).length}</div>`; });
                    html += '</div>';
                });
                document.getElementById('contradictions-results').innerHTML = html;
            } catch(e) { document.getElementById('contradictions-results').innerHTML = 'Ошибка: ' + esc(e.message); }
        }

        async function loadGaps() {
            try {
                const resp = await fetch(API + '/api/gaps');
                const data = await resp.json();
                if (!data.gaps || data.gaps.length === 0) { document.getElementById('gaps-results').innerHTML = '<p>Пробелы не обнаружены</p>'; return; }
                let html = '<div class="gaps"><h3>Неизученные комбинации процесс + материал</h3>';
                data.gaps.forEach(g => { html += `<div class="source-item"><span class="tag process">${esc(g.process)}</span> + <span class="tag material">${esc(g.material)}</span><span class="meta"> (источников по процессу: ${g.process_sources}, по материалу: ${g.material_sources})</span></div>`; });
                html += '</div>';
                document.getElementById('gaps-results').innerHTML = html;
            } catch(e) { document.getElementById('gaps-results').innerHTML = 'Ошибка: ' + esc(e.message); }
        }

        async function loadDocuments() {
            try {
                const resp = await fetch(API + '/api/documents?limit=50');
                const data = await resp.json();
                let html = `<p style="margin-bottom:15px;color:#94a3b8">Всего: ${data.count}</p>`;
                data.documents.forEach(d => {
                    html += `<div class="source-item"><div class="title">${esc(d.title)}</div><div class="meta">${esc(d.filename)} | ${d.year||'н.д.'} | ${esc(d.geography)} | ${esc(d.category)} | ${esc(d.language)} | trust: ${d.trust}</div></div>`;
                });
                document.getElementById('documents-results').innerHTML = html;
            } catch(e) { document.getElementById('documents-results').innerHTML = 'Ошибка: ' + esc(e.message); }
        }
    </script>
</body>
</html>
